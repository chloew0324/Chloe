<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Avant Garde type book project page from Chloe Wang's portfolio."
    />
    <title>Avant Garde | Chloe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="project-detail-body avantgarde-detail-body">
    <header class="site-header">
      <a href="./index.html" aria-label="Back to home">
        <img
          class="site-title-image"
          src="./image/homepagework/chloe2.png"
          alt="Chloe"
        />
      </a>
    </header>

    <div class="site-frame">
      <aside class="left-rail">
        <a class="rail-mark" href="./index.html" aria-label="Back to work">
          <img src="./image/homepagework/deng.png" alt="Lamp mark" />
        </a>

        <nav class="rail-nav" aria-label="Primary">
          <a class="nav-link is-active" href="./index.html">work</a>
          <a class="nav-link" href="./index.html#other">other</a>
          <a class="nav-link" href="./index.html#about">about</a>
        </nav>
      </aside>

      <main class="page detail-page-main">
        <article class="avantgarde-page" aria-labelledby="avantgarde-title">
          <h1 class="visually-hidden" id="avantgarde-title">Avant Garde</h1>

          <figure class="avantgarde-hero">
            <img
              src="./image/avantgarde/avangt gardebookcover.png"
              alt="Avant Garde book cover and back cover"
            />
          </figure>

          <figure class="avantgarde-gallery">
            <img
              src="./image/avantgarde/avangt garde.png"
              alt="Interior spreads from the Avant Garde type book"
            />
          </figure>

          <figure class="avantgarde-final-spread">
            <img
              src="./image/avantgarde/avangt garde 5.png"
              alt="Final spread from the Avant Garde type book"
            />
          </figure>
        </article>
      </main>
    </div>
  </body>
</html>
