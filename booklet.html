<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Booklet illustration project page from Chloe Wang's portfolio."
    />
    <title>Booklet | Chloe</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body class="project-detail-body booklet-detail-body">
    <header class="site-header">
      <a href="./index.html" aria-label="Back to home">
        <img
          class="site-title-image"
          src="./image/homepagework/chloe2.png"
          alt="Chloe"
        />
      </a>
    </header>

    <div class="site-frame">
      <aside class="left-rail">
        <a class="rail-mark" href="./index.html" aria-label="Back to work">
          <img src="./image/homepagework/deng.png" alt="Lamp mark" />
        </a>

        <nav class="rail-nav" aria-label="Primary">
          <a class="nav-link is-active" href="./index.html">work</a>
          <a class="nav-link" href="./index.html#other">other</a>
          <a class="nav-link" href="./index.html#about">about</a>
        </nav>
      </aside>

      <main class="page detail-page-main">
        <article class="booklet-page" aria-labelledby="booklet-title">
          <h1 class="visually-hidden" id="booklet-title">Booklet Illustration</h1>

          <section class="booklet-row booklet-row-hero" aria-label="Booklet cover and opening spread">
            <figure class="booklet-cover-card">
              <img src="./image/booklet/bookletdesign.png" alt="Booklet cover artwork" />
            </figure>

            <figure class="booklet-wide-card booklet-hero-wide">
              <img src="./image/booklet/booklet1.jpg" alt="Booklet opening illustration spread" />
            </figure>
          </section>

          <section class="booklet-row booklet-row-wide" aria-label="Letter spreads">
            <figure class="booklet-wide-card">
              <img src="./image/booklet/booklet4.jpg" alt="Booklet spread with green lettering" />
            </figure>

            <figure class="booklet-wide-card">
              <img src="./image/booklet/booklet2.jpg" alt="Booklet spread with orange lettering" />
            </figure>
          </section>

          <section class="booklet-row booklet-row-wide" aria-label="Character spreads">
            <figure class="booklet-wide-card">
              <img src="./image/booklet/booklet5.jpg" alt="Booklet spread with caterpillar character" />
            </figure>

            <figure class="booklet-wide-card">
              <img src="./image/booklet/booklet3.jpg" alt="Booklet spread with bird and umbrella" />
            </figure>
          </section>

          <section class="booklet-row booklet-row-portraits" aria-label="Vertical illustration sequence">
            <figure class="booklet-tall-card">
              <img src="./image/booklet/booklet10.jpg" alt="Vertical booklet illustration with rabbit and cauldron" />
            </figure>

            <figure class="booklet-tall-card">
              <img src="./image/booklet/booklet6.jpg" alt="Vertical booklet illustration with green rabbit" />
            </figure>

            <figure class="booklet-tall-card">
              <img src="./image/booklet/booklet9.jpg" alt="Vertical booklet illustration with spacecraft" />
            </figure>
          </section>

          <section class="booklet-row booklet-row-trees" aria-label="Closing vertical illustrations">
            <figure class="booklet-tree-card">
              <img src="./image/booklet/booklet7.jpg" alt="Vertical booklet illustration with tree and dark duck" />
            </figure>

            <figure class="booklet-tree-card">
              <img src="./image/booklet/booklet8.jpg" alt="Vertical booklet illustration with pink tree and white goose" />
            </figure>
          </section>
        </article>
      </main>
    </div>
  </body>
</html>
